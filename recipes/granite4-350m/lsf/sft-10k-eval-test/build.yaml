######
# SFT (2 epochs) on a 10k sample, chained to the full 27-target eval
# suite via an output binding. The sft-training target emits a
# NEWARTIFACT_IN_ENVIRONMENT_EVENT once the open-instruct trainer
# writes its final checkpoint (epoch 2 with NUM_EPOCHS=2 and
# checkpointing_steps=epoch); that event resolves the
# `sft-training.checkpoint` binding and unblocks the 27 eval targets.
#
# Eval targets read the HF-converted checkpoint at
# <run_output_dir>-hf/epoch_hf_<NUM_EPOCHS> via Jinja templating on
# the resolved binding path.
######
granite.build:
  name: sft-10k-eval-test
  retries:
    max_retries: 5
  targets:
    # ─── SFT training (1) ───────────────────────────────────────────────────────
    sft-training:
      environment_uri: space://environments/skypilot/lsf
      outputs:
        checkpoint:
          uri: "env://$${OUTPUT_DIR}"
          type: model
      steps:
        - step_uri: space://steps/openinstruct-sft
          config:
            sft_config:
              model_path: "$${MODEL_PATH}"
              tokenized_data_path: "$${TOKENIZED_DATA_PATH}"
              chat_template_path: "$${CHAT_TEMPLATE_PATH}"
              output_dir: "$${OUTPUT_DIR}"
              num_epochs: $${NUM_EPOCHS}
              per_device_train_batch_size: $${PER_DEVICE_BATCH_SIZE}
              gradient_accumulation_steps: $${GRADIENT_ACCUMULATION_STEPS}
              learning_rate: "$${LEARNING_RATE}"
              lr_scheduler_type: "$${LR_SCHEDULER_TYPE}"
              warmup_ratio: "$${WARMUP_RATIO}"
              weight_decay: "$${WEIGHT_DECAY}"
              clip_grad_norm: "$${CLIP_GRAD_NORM}"
              max_seq_len: $${MAX_SEQ_LEN}
              mixed_precision: "$${MIXED_PRECISION}"
              seed: $${SEED}
              reduce_loss: "$${REDUCE_LOSS}"
              checkpointing_steps: "$${CHECKPOINTING_STEPS}"
              keep_last_n_checkpoints: $${KEEP_LAST_N_CHECKPOINTS}
              logging_steps: $${LOGGING_STEPS}
            launcher_config:
              resources:
                accelerators: "$${ACCELERATORS}"
                cluster: "$${CLUSTER}"
                zone: "$${SFT_QUEUE}"
                memory: "$${MEMORY}"

    # ─── Code (9) ───────────────────────────────────────────────────────────────
    olmes-cruxeval:
      environment_uri: space://environments/skypilot/lsf
      inputs:
        model_checkpoint:
          binding: sft-training.checkpoint
      outputs:
        sage_eval_results:
          type: dataset
          uri: "env://$${SAGE_OUTPUT_DIR}/$${EXPERIMENT}/code/olmes-instruct/cruxeval_output"
      steps:
        - step_uri: space://steps/sage-eval
          config:
            sage_eval_config:
              gb_script: "code_olmes_cruxeval_slim.sh"
              model_path: "{{ bindings.model_checkpoint.binding.path }}-hf/epoch_hf_$${NUM_EPOCHS}"
              experiment: "$${EXPERIMENT}"
              batch_size: $${BATCH_SIZE}
              max_length: $${MAX_LENGTH}
              num_gpus: $${NUM_GPUS}
              output_dir: "$${SAGE_OUTPUT_DIR}"
              image_id: "docker:us.icr.io/cil15-shared-registry/sage-py311-olmes:0.025"
