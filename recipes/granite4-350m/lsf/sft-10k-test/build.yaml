granite.build:
  name: sft-10k-test
  targets:
    sft-training:
      environment_uri: space://environments/skypilot/lsf
      outputs:
        # Declare the artifact the openinstruct-sft step emits via its
        # `LLMB_ARTIFACT_ID:checkpoint` line. Without this declaration the
        # buildrun resolver drops the NEWARTIFACT event on the floor and
        # the checkpoint never gets recorded for downstream consumption.
        #
        # `uri` is templated against the NEWARTIFACT event's binding payload
        # (filled by `pushasset` in environment.py with `binding=<payload>`),
        # so `{{ binding.path }}` resolves to the run-specific dir the SFT
        # step actually wrote (e.g. /proj/.../sft/checkpoints/v0-<DATE>-<TIME>).
        # Hardcoding `env://$${OUTPUT_DIR}` would force every downstream eval
        # to read the parent directory instead of the run-specific subdir,
        # because pullasset_envstore strips `env://` from this URI verbatim.
        checkpoint:
          uri: "env://{{ binding.path }}"
          type: model
      steps:
        - step_uri: space://steps/openinstruct-sft
          config:
            sft_config:
              model_path: "$${MODEL_PATH}"
              tokenized_data_path: "$${TOKENIZED_DATA_PATH}"
              chat_template_path: "$${CHAT_TEMPLATE_PATH}"
              output_dir: "$${OUTPUT_DIR}"
              num_epochs: $${NUM_EPOCHS}
              per_device_train_batch_size: $${PER_DEVICE_BATCH_SIZE}
              gradient_accumulation_steps: $${GRADIENT_ACCUMULATION_STEPS}
              learning_rate: "$${LEARNING_RATE}"
              lr_scheduler_type: "$${LR_SCHEDULER_TYPE}"
              warmup_ratio: "$${WARMUP_RATIO}"
              weight_decay: "$${WEIGHT_DECAY}"
              clip_grad_norm: "$${CLIP_GRAD_NORM}"
              max_seq_len: $${MAX_SEQ_LEN}
              mixed_precision: "$${MIXED_PRECISION}"
              seed: $${SEED}
              reduce_loss: "$${REDUCE_LOSS}"
              checkpointing_steps: "$${CHECKPOINTING_STEPS}"
              keep_last_n_checkpoints: $${KEEP_LAST_N_CHECKPOINTS}
              logging_steps: $${LOGGING_STEPS}
            launcher_config:
              resources:
                accelerators: "$${ACCELERATORS}"
                cluster: "$${CLUSTER}"
                zone: "$${QUEUE}"
                memory: "$${MEMORY}"
