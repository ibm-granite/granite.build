apiVersion: batch/v1
kind: Job
metadata:
  name: gb-logging-job
spec:
  template:
    metadata:
      labels:
        granite-dot-build/build-id: 4b281701-ff56-4b14-a040-eccbcd0cf570
        granite-dot-build/build-step-id: c95bf125-078f-47f9-a495-0fdafb4c9240
        granite-dot-build/build-step-name: synthetic-data-generation-1
    spec:
      restartPolicy: Never
      containers:
      - name: busybox
        image: quay.io/project-codeflare/busybox:1.36
        command: ["sh", "-c", "for i in $(seq 1 1000); do echo \"{\"id\": $i, \"message\": \"RIS3 log\"}\"; echo \"RIS3 Log $i\" >&2; sleep 1; done"]
        resources:
          requests:
            cpu: 1m
