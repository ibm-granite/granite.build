name: hello
version: v1
type: custom
config: {}
environment_configs:
  Bash:
    launchers:
      hello:
        type: nohup
        monitors:
        - log_monitor
    monitors:
      log_monitor:
        type: log_monitor
        config:
          event_configs:
          - event_type: MESSAGE_EVENT
            line_regex: .*
            is_json: false
            event_fields:
            - field_name: msg
              field_regex: .*
