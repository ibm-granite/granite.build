granite.build:
  name: datagen-tuning-eval
  targets:
    syntheticdatageneration:
      environment_uri: space://environments/vela1-gb
      inputs:
        digit_input:
          uri: lh://prod/granite_dot_build.public/filesets/fileset_shared/gb_digit_data/20250319T171629 # $DGT_DATA_DIR
      outputs:
        digit_output: # DGT_OUTPUT_DIR/task.../final_data.jsonl
          uri: lh://prod/granite_dot_build.public/tables/synth_data_{{ run_metadata.targetsteprun_id | short_hash }}
      steps:
        - step_uri: space://steps/digit
          config:
            gb:
              mock: True
            digit_config:
              databuilders:
                knowledge_sdg:
                  blocks:
                    - name: generator
                      type: rits
                      base_url: https://inference-3scale-apicast-production.apps.rits.fmaas.res.ibm.com/mixtral-8x22b-instruct-v01/v1
                      model_id_or_path: mistralai/mixtral-8x22B-instruct-v0.1
                      temperature: 0.5
                      max_new_tokens: 1024
                      min_new_tokens: 1
                    - name: validator
                      type: lm_judge
                      filter: true
                      lm_config:
                        type: rits
                        base_url: https://inference-3scale-apicast-production.apps.rits.fmaas.res.ibm.com/mixtral-8x22b-instruct-v01/v1
                        model_id_or_path: mistralai/mixtral-8x22B-instruct-v0.1
                        temperature: 0.5
                        max_new_tokens: 1024
                        min_new_tokens: 1
              tasks:
                "tasks/watsonx/instructlab/knowledge/maximo":
                  created_by: IBM Research
                  data_builder: knowledge_sdg
                  runner_config:
                    num_outputs_to_generate: 1
                    seed_batch_size: 1
                    machine_batch_size: 1
                  task_description: Answer all the FMEA related questions. Make sure to provide as specific details as possible.
                  domain: IBM Maximo
                  instruction_format:
                    input: "{% raw %}SYSTEM: You are a reliability engineer having expertise in industrial asset management and can answer questions about failure modes and effect analysis (FMEA) for industrial assets. You are knowledgeable about the boundary conditions of an asset, asset components, failure mechanisms, their degradation influences, discovery or prevention opportunities and mitigation activities. You are a cautious assistant. You carefully follow instructions. You are helpful and harmless and you follow ethical guidelines and promote positive behavior.\n<|conversation|>\nUSER: {{question}}\nAGENT: {% endraw %}"
                    output: "{% raw %}{{answer}}{% endraw %}"
                  seed_datastore:
                    type: default
                    data_path: "{{ bindings.digit_input.binding.path }}/seeds.jsonl"
                  include:
                    documents:
                      maximo_docs: "{{ bindings.digit_input.binding.path }}/documents/*.md"
    tunedmodel:
      environment_uri: space://environments/vela1-gb
      inputs:
        model_to_tune:
          uri: lh://prod/granite_dot_build.public/models/model_shared/granite-2b-base/20250319T181102
        tuning_data:
          binding: syntheticdatageneration.digit_output
      outputs:
        tuned_checkpoint:
          uri: lh://prod/granite_dot_build.public/models/model_shared/gb_tuned_model_{{ run_metadata.targetsteprun_id | short_hash }}_{{ binding.path | path_basename }}
      steps:
        - step_uri: space://steps/tuning
          config:
            gb:
              mock: False
            tuning-config:
              # Tuning Docs: https://github.com/foundation-model-stack/fms-hf-tuning/
              # Tuning hyper parameters
              logging_steps: "1"
              max_steps: "15"
              save_steps: "10"
              save_strategy: "steps"
              # Data config
              data_formatter_template: "{% raw %}### Question: {{question}}\\\n### Answer: {{answer}}\\\n{% endraw %}"
              response_template: "\\\n### Answer:"
              # Optimizer
              optim: adamw_torch_fused
              optim_args: lr=5.0e-5,weight_decay=0.1,eps=1e-10
              # optimizations
              use_flash_attn: true
            compute_config:
              num_gpus_per_node: 2
              num_nodes: 1
    evalresults:
      environment_uri: space://environments/vela1-gb
      inputs:
        tuned_model:
          binding: tunedmodel.tuned_checkpoint
      outputs:
        eval_results:
          uri: lh://prod/granite_dot_build.public/tables/eval_results_{{ run_metadata.targetsteprun_id | short_hash }}
      steps:
        - step_uri: space://steps/fm-eval
          config:
            k8s:
              image: us.icr.io/cil15-shared-registry/step_fm_eval:0.1.5-test
            gb:
              mock: False
            fm_eval_config:
              model_path: "huggingface/{{ bindings.tuned_model.binding.path }}"
              benchmark_name: "example_simple_inference"
              run_env: huggingface
              predictions_namespace: evaluation
