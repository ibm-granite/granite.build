granite.build:
  name: slurm-unitxt-test
  targets:
    evaluate:
      environment_uri: space://environments/slurm
      outputs:
        eval_results:
          uri: file:outputs/slurm-unitxt-eval/
      steps:
        - step_uri: space://steps/unitxt-eval
          launcher: slurm-unitxt-eval
          config:
            launcher_config:
              envs:
                LLMB_HF_MODEL_NAME: "ibm-granite/granite-4.0-350m"
                LLMB_BASH_OUTPUT_DIR: "/tmp/gb-outputs/unitxt"
                LLMB_ARTIFACT_OUTPUT_ID: "eval_results"
