granite.build:
  name: slurm-unitxt-test
  targets:
    evaluate:
      environment_uri: space://environments/skypilot/slurm
      inputs:
        model:
          uri: hf:///ibm-granite/granite-4.0-350m
      outputs:
        eval_results:
          uri: s3://gb-checkpoints/outputs/unitxt-eval/
      steps:
        - step_uri: space://steps/unitxt-eval
          launcher: slurm-unitxt-eval
          config:
            launcher_config:
              envs:
                LLMB_HF_MODEL_NAME: "ibm-granite/granite-4.0-350m"
                LLMB_BASH_OUTPUT_DIR: "/root/gb-outputs/unitxt"
                LLMB_ARTIFACT_OUTPUT_ID: "eval_results"
                AWS_ACCESS_KEY_ID: "minioadmin"
                AWS_SECRET_ACCESS_KEY: "minioadmin"
