granite.build:
  name: docker-unitxt-test-cpu
  targets:
    evaluate:
      environment_uri: space://environments/docker
      inputs:
        model:
          uri: hf:///ibm-granite/granite-4.0-350m
      outputs:
        eval_results:
          uri: file:outputs/unitxt-eval/
      steps:
        - step_uri: space://steps/unitxt-eval
          launcher: unitxt-eval-cpu
          config:
            docker:
              env:
                LLMB_BASH_INPUT_MODEL:
                  value: "{{ bindings.model.binding.path }}"
                LLMB_BASH_OUTPUT_DIR:
                  value: "/gb-workspace/outputs"
                LLMB_ARTIFACT_OUTPUT_ID:
                  value: "eval_results"
            compute_config:
              num_nodes: 1
              num_gpus_per_node: 0
