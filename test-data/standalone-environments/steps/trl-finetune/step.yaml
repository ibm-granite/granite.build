name: trl-finetune
version: v1
type: custom
config: {}

environment_configs:
  Bash:
    launchers:
      trl-finetune:
        type: nohup
        monitors:
          - log_monitor
        config:
          script_path: run.py
    monitors:
      log_monitor:
        type: log_monitor
        config:
          event_configs:
            - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
              line_regex: "LLMB_ARTIFACT_ID:.* LLMB_ARTIFACT_PATH:.*"
              is_json: false
              event_fields:
                - field_name: binding_id
                  field_regex: "(?<=LLMB_ARTIFACT_ID:)[^ ]+"
                - field_name: path
                  field_regex: "(?<=LLMB_ARTIFACT_PATH:).*"
                  is_data: true
                - field_name: binding
                  field_value_template: '{ "path": "{{ fields.data.path }}" }'
                  is_json: true
            - event_type: MESSAGE_EVENT
              line_regex: ".*"
              is_json: false
              event_fields:
                - field_name: msg
                  field_regex: ".*"

  Skypilot:
    launchers:
      slurm-trl-finetune:
        type: skypilot
        monitors:
          - skypilot_log
        config:
          resources:
            cloud: slurm
            cluster: slurm-docker
            zone: normal
          setup: |
            pip install torch transformers trl peft datasets accelerate huggingface_hub
          run: |
            python3 -c "
            import json, os, sys, time

            output_dir = os.environ.get('LLMB_BASH_OUTPUT_DIR', '/tmp/trl-output')
            model_name = os.environ.get('LLMB_HF_MODEL_NAME', 'ibm-granite/granite-4.0-350m')
            artifact_id = os.environ.get('LLMB_ARTIFACT_OUTPUT_ID', 'finetuned_model')
            os.makedirs(output_dir, exist_ok=True)
            checkpoint_dir = os.path.join(output_dir, 'checkpoint')

            print(f'Downloading model: {model_name}')
            from huggingface_hub import snapshot_download
            model_path = snapshot_download(model_name)
            print(f'Model downloaded to: {model_path}')

            from transformers import AutoModelForCausalLM, AutoTokenizer
            import torch

            device = 'cuda' if torch.cuda.is_available() else 'cpu'
            print(f'Using device: {device}')

            tokenizer = AutoTokenizer.from_pretrained(model_path)
            if tokenizer.pad_token is None:
                tokenizer.pad_token = tokenizer.eos_token

            model = AutoModelForCausalLM.from_pretrained(model_path, torch_dtype=torch.bfloat16)
            model.to(device)
            print(f'Model loaded: {model.config.model_type}, {model.num_parameters():,} params')

            from datasets import Dataset
            train_data = [
                {'text': '### Instruction: What is granite?\n### Response: Granite is a coarse-grained igneous rock.'},
                {'text': '### Instruction: What is ML?\n### Response: ML is a subset of AI where systems learn from data.'},
                {'text': '### Instruction: What is Python?\n### Response: Python is a high-level programming language.'},
            ]
            dataset = Dataset.from_list(train_data)

            from trl import SFTConfig, SFTTrainer
            training_args = SFTConfig(
                output_dir=checkpoint_dir, max_steps=2, per_device_train_batch_size=1,
                learning_rate=5e-5, logging_steps=1, save_steps=2, save_strategy='steps',
                optim='adamw_torch', report_to='none', push_to_hub=False,
                fp16=False, bf16=(device != 'cpu'),
            )

            trainer = SFTTrainer(model=model, processing_class=tokenizer, train_dataset=dataset, args=training_args)
            start = time.time()
            print('Starting fine-tuning (2 steps)...')
            result = trainer.train()
            elapsed = time.time() - start
            print(f'Fine-tuning complete in {elapsed:.1f}s')

            trainer.save_model(checkpoint_dir)
            tokenizer.save_pretrained(checkpoint_dir)

            summary = {'status': 'success', 'model_type': model.config.model_type,
                       'num_parameters': model.num_parameters(), 'max_steps': 2,
                       'training_loss': result.training_loss, 'elapsed_seconds': round(elapsed, 1)}
            with open(os.path.join(output_dir, 'training_summary.json'), 'w') as f:
                json.dump(summary, f, indent=2)
            print(f'Summary: {json.dumps(summary, indent=2)}')

            print(f'LLMB_ARTIFACT_ID:{artifact_id} LLMB_ARTIFACT_PATH:{checkpoint_dir}')
            print('TRL_FINETUNE_SUCCESS')
            "
    monitors:
      skypilot_log:
        type: skypilot_monitor
        config:
          event_configs:
            - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
              line_regex: "LLMB_ARTIFACT_ID:.* LLMB_ARTIFACT_PATH:.*"
              is_json: false
              event_fields:
                - field_name: binding_id
                  field_regex: "(?<=LLMB_ARTIFACT_ID:)[^ ]+"
                - field_name: path
                  field_regex: "(?<=LLMB_ARTIFACT_PATH:).*"
                  is_data: true
                - field_name: binding
                  field_value_template: '{ "path": "{{ fields.data.path }}" }'
                  is_json: true
            - event_type: MESSAGE_EVENT
              line_regex: ".*"
              is_json: false
              event_fields:
                - field_name: msg
                  field_regex: ".*"

  Docker:
    launchers:
      trl-finetune:
        type: docker
        monitors:
          - docker_log
        config:
          image: gbserver-test-trl-unitxt:gpu
          command: >-
            python3 /gb-workspace/bash_scripts/trl-finetune/run.py
      trl-finetune-cpu:
        type: docker
        monitors:
          - docker_log
        config:
          image: gbserver-test-trl-unitxt:cpu
          command: >-
            python3 /gb-workspace/bash_scripts/trl-finetune/run.py
    monitors:
      docker_log:
        type: docker_log
        config:
          event_configs:
            - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
              line_regex: "LLMB_ARTIFACT_ID:.* LLMB_ARTIFACT_PATH:.*"
              is_json: false
              event_fields:
                - field_name: binding_id
                  field_regex: "(?<=LLMB_ARTIFACT_ID:)[^ ]+"
                - field_name: path
                  field_regex: "(?<=LLMB_ARTIFACT_PATH:).*"
                  is_data: true
                - field_name: binding
                  field_value_template: '{ "path": "{{ fields.data.path }}" }'
                  is_json: true
            - event_type: MESSAGE_EVENT
              line_regex: ".*"
              is_json: false
              event_fields:
                - field_name: msg
                  field_regex: ".*"
