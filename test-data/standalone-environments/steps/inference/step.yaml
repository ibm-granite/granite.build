name: inference
version: v1
type: custom
config: {}

environment_configs:
  Bash:
    launchers:
      inference:
        type: nohup
        monitors:
          - log_monitor
        config:
          script_path: run.py
    monitors:
      log_monitor:
        type: log_monitor
        config:
          event_configs:
            - event_type: MESSAGE_EVENT
              line_regex: ".*"
              is_json: false
              event_fields:
                - field_name: msg
                  field_regex: ".*"

  Docker:
    launchers:
      inference:
        type: docker
        monitors:
          - docker_log
        config:
          image: huggingface/transformers-pytorch-gpu:latest
          command: python /gb-workspace/bash_scripts/inference/run.py
      inference-cpu:
        type: docker
        monitors:
          - docker_log
        config:
          image: python:3.11-slim
          command: python /gb-workspace/bash_scripts/inference/run.py
    monitors:
      docker_log:
        type: docker_log
        config:
          event_configs:
            - event_type: MESSAGE_EVENT
              line_regex: ".*"
              is_json: false
              event_fields:
                - field_name: msg
                  field_regex: ".*"
