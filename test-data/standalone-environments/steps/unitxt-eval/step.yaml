name: unitxt-eval
version: v1
type: custom
config: {}

environment_configs:
  Bash:
    launchers:
      unitxt-eval:
        type: nohup
        monitors:
          - log_monitor
        config:
          script_path: run.py
    monitors:
      log_monitor:
        type: log_monitor
        config:
          event_configs:
            - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
              line_regex: "LLMB_ARTIFACT_ID:.* LLMB_ARTIFACT_PATH:.*"
              is_json: false
              event_fields:
                - field_name: binding_id
                  field_regex: "(?<=LLMB_ARTIFACT_ID:)[^ ]+"
                - field_name: path
                  field_regex: "(?<=LLMB_ARTIFACT_PATH:).*"
                  is_data: true
                - field_name: binding
                  field_value_template: '{ "path": "{{ fields.data.path }}" }'
                  is_json: true
            - event_type: MESSAGE_EVENT
              line_regex: ".*"
              is_json: false
              event_fields:
                - field_name: msg
                  field_regex: ".*"

  Skypilot:
    launchers:
      slurm-unitxt-eval:
        type: skypilot
        monitors:
          - skypilot_log
        config:
          resources:
            cloud: slurm
            cluster: slurm-docker
            zone: normal
          setup: |
            pip install torch transformers huggingface_hub
          run: |
            python3 -c "
            import json, os, sys, time

            output_dir = os.environ.get('LLMB_BASH_OUTPUT_DIR', '/tmp/unitxt-output')
            model_name = os.environ.get('LLMB_HF_MODEL_NAME', 'ibm-granite/granite-4.0-350m')
            artifact_id = os.environ.get('LLMB_ARTIFACT_OUTPUT_ID', 'eval_results')
            os.makedirs(output_dir, exist_ok=True)

            print(f'Downloading model: {model_name}')
            from huggingface_hub import snapshot_download
            model_path = snapshot_download(model_name)
            print(f'Model downloaded to: {model_path}')

            from transformers import AutoModelForCausalLM, AutoTokenizer
            import torch

            device = 'cuda' if torch.cuda.is_available() else 'cpu'
            print(f'Using device: {device}')

            tokenizer = AutoTokenizer.from_pretrained(model_path)
            if tokenizer.pad_token is None:
                tokenizer.pad_token = tokenizer.eos_token

            model = AutoModelForCausalLM.from_pretrained(model_path, torch_dtype=torch.float32)
            model.to(device)
            model.eval()
            print(f'Model loaded: {model.config.model_type}, {model.num_parameters():,} params')

            prompts = [
                'What is the capital of France?',
                'Explain what a neural network is in one sentence.',
            ]

            start = time.time()
            print(f'Running evaluation on {len(prompts)} prompts...')
            results = []

            for i, prompt in enumerate(prompts):
                messages = [{'role': 'user', 'content': prompt}]
                formatted = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                inputs = tokenizer(formatted, return_tensors='pt', truncation=True, max_length=256).to(device)
                with torch.no_grad():
                    outputs = model.generate(**inputs, max_new_tokens=50, do_sample=False, use_cache=False)
                new_tokens = outputs[0][inputs['input_ids'].shape[1]:]
                prediction = tokenizer.decode(new_tokens, skip_special_tokens=True).strip()
                results.append({'prompt': prompt, 'prediction': prediction,
                               'input_tokens': inputs['input_ids'].shape[1],
                               'output_tokens': outputs.shape[1]})
                print(f'  [{i+1}/{len(prompts)}] {prompt[:40]}... -> {prediction[:60]}...')

            elapsed = time.time() - start
            print(f'Evaluation complete in {elapsed:.1f}s')

            eval_output = {'status': 'success', 'model_type': model.config.model_type,
                          'num_parameters': model.num_parameters(), 'num_samples': len(prompts),
                          'elapsed_seconds': round(elapsed, 1), 'results': results}
            results_path = os.path.join(output_dir, 'eval_results.json')
            with open(results_path, 'w') as f:
                json.dump(eval_output, f, indent=2)
            print(f'Results: {json.dumps(eval_output, indent=2)}')

            print(f'LLMB_ARTIFACT_ID:{artifact_id} LLMB_ARTIFACT_PATH:{output_dir}')
            print('UNITXT_EVAL_SUCCESS')
            "
    monitors:
      skypilot_log:
        type: skypilot_monitor
        config:
          event_configs:
            - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
              line_regex: "LLMB_ARTIFACT_ID:.* LLMB_ARTIFACT_PATH:.*"
              is_json: false
              event_fields:
                - field_name: binding_id
                  field_regex: "(?<=LLMB_ARTIFACT_ID:)[^ ]+"
                - field_name: path
                  field_regex: "(?<=LLMB_ARTIFACT_PATH:).*"
                  is_data: true
                - field_name: binding
                  field_value_template: '{ "path": "{{ fields.data.path }}" }'
                  is_json: true
            - event_type: MESSAGE_EVENT
              line_regex: ".*"
              is_json: false
              event_fields:
                - field_name: msg
                  field_regex: ".*"

  Docker:
    launchers:
      unitxt-eval:
        type: docker
        monitors:
          - docker_log
        config:
          image: gbserver-test-trl-unitxt:gpu
          command: >-
            python3 /gb-workspace/bash_scripts/unitxt-eval/run.py
      unitxt-eval-cpu:
        type: docker
        monitors:
          - docker_log
        config:
          image: gbserver-test-trl-unitxt:cpu
          command: >-
            python3 /gb-workspace/bash_scripts/unitxt-eval/run.py
    monitors:
      docker_log:
        type: docker_log
        config:
          event_configs:
            - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
              line_regex: "LLMB_ARTIFACT_ID:.* LLMB_ARTIFACT_PATH:.*"
              is_json: false
              event_fields:
                - field_name: binding_id
                  field_regex: "(?<=LLMB_ARTIFACT_ID:)[^ ]+"
                - field_name: path
                  field_regex: "(?<=LLMB_ARTIFACT_PATH:).*"
                  is_data: true
                - field_name: binding
                  field_value_template: '{ "path": "{{ fields.data.path }}" }'
                  is_json: true
            - event_type: MESSAGE_EVENT
              line_regex: ".*"
              is_json: false
              event_fields:
                - field_name: msg
                  field_regex: ".*"
