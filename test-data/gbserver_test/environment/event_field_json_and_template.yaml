event_configs:
- event_type: ARTIFACT_PUSHED_EVENT
  line_regex: "Pushed\\sURI:\\s.+"
  is_json: False
  event_fields:
    - field_name: uri
      field_regex: "{[^}]+}"
      is_json: True
      field_value_template: '"{{ fields.uri.uri }}"'
    - field_name: binding_id
      field_regex: "(?<=binding\\s)[^\\s]+"
