# YAML-driven equivalent of OneStepBlueVelaDownloadTestConfig in
# test/integration/ibm/buildrunner/lsf/test_buildrunner_1step_bluevela.py.
# build_yaml defaults to ./build.yaml (sibling) when omitted.
targets:
  - download_file
target_expectations:
  # TODO: is this true for BlueVela?
  # CPU env has 5 steps (not 4 like GPU) since it does not mount the AFM and does an lhpull step instead.
  - target_name: download_file
    step_count: 5
    input_artifact_count: 1
    output_artifact_count: 1
    jobstats_count: 3
