# YAML-driven equivalent of OneStepLocalTestConfig in
# test/integration/ibm/buildrunner/local/test_buildrunner_1step_local.py.
# build_yaml defaults to ./build.yaml (sibling) when omitted.
targets:
  - echo
target_expectations:
  - target_name: echo
    step_count: 1
    input_artifact_count: 0
    output_artifact_count: 0
    jobstats_count: 0
# Use the shared standalone space at <repo>/configurations/spaces/local so the BuildRunner
# resolves space:// URIs (the bash environment and the echo step) without
# cloning from GitHub.  Relative path resolves against this YAML's directory.
space_uri: ../../../../../../../configurations/spaces/local
