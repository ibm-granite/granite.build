# YAML-driven spec for test/integration/standalone/buildrunner/skypilot_slurm/test_skypilot_slurm_hf.py.
# Mirrors test-data/integration/standalone/buildrunner/docker/docker-hf/buildtest.yaml.
targets:
  - image-run
target_expectations:
  - target_name: image-run
    step_count: 5                # hfpull + bash + hfpushx3
    input_artifact_count: 1
    output_artifact_count: 2
    jobstats_count: 3
# Use the local sibling space dir so the BuildRunner resolves space:// URIs
# without cloning from GitHub.
space_uri: ./space
simulate_step_failure: false
timeout_minutes: 10 

