name: hfpush_bash
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false
  workload:
    cwd: "."
  hfpush_config:
    path: <path>
    uri: <uri>
    binding_id: <binding_id>
    hf:
      type: model
      owner: ""
      repo: ""
      revision: ""
      private: true
      organization: null
      resource_group_id: null
  compute_config:
    total_memory_per_node: 10Gi

# Bare-node variant of hfpush for Skypilot+slurm clusters that lack the Pyxis
# SPANK plugin.  The launcher host must have python/pip and curl available;
# pip installs huggingface_hub[cli] in setup.
environment_configs:
  Skypilot:
    default_launcher: hfpush
    launchers:
      hfpush:
        type: skypilot
        monitors:
        - skypilot_monitor
        config:
          resources:
            cpus: "1+"
          setup: |
            pip install --no-cache-dir 'huggingface_hub[cli]'
          run: |
            echo 'hfpush start'

            HF_SOURCE='{{ config.hfpush_config.path }}'
            HF_URI='{{ config.hfpush_config.uri }}'
            HF_OWNER='{{ config.hfpush_config.owner }}'
            HF_REPO_NAME='{{ config.hfpush_config.repo }}'
            HF_REPO="${HF_OWNER}/${HF_REPO_NAME}"
            HF_REVISION='{{ config.hfpush_config.revision }}'
            HF_PRIVATE='{{ config.hfpush_config.private }}'
            HF_TYPE='{{ config.hfpush_config.hf.type }}'
            HF_RESOURCE_GROUP_ID='{{ config.hfpush_config.hf.resource_group_id }}'
            BINDING_ID='{{ config.hfpush_config.binding_id }}'

            if [ -z "${HF_TOKEN:-}" ]; then
                echo 'HF_TOKEN is not set' >&2
                exit 1
            fi

            HF_VISIBILITY="public"
            if [ "${HF_PRIVATE}" = "True" ]; then
                HF_VISIBILITY="private"
            fi

            # Treat both "" and the literal "None" (jinja-rendered Python None)
            # as "no resource group" — callers whose resource_group_id is unset
            # otherwise produce a literal "None" string and HF rejects it.
            if [ -n "${HF_RESOURCE_GROUP_ID}" ] && [ "${HF_RESOURCE_GROUP_ID}" != "None" ]; then
                CREATE_BODY=$(printf '{"name":"%s","organization":"%s","type":"%s","visibility":"%s","resourceGroupId":"%s"}' \
                    "${HF_REPO_NAME}" "${HF_OWNER}" "${HF_TYPE}" "${HF_VISIBILITY}" "${HF_RESOURCE_GROUP_ID}")
            else
                CREATE_BODY=$(printf '{"name":"%s","organization":"%s","type":"%s","visibility":"%s"}' \
                    "${HF_REPO_NAME}" "${HF_OWNER}" "${HF_TYPE}" "${HF_VISIBILITY}")
            fi

            echo "Creating HF repo ${HF_REPO} (resource_group_id=${HF_RESOURCE_GROUP_ID:-<none>})"
            CREATE_RESP=$(mktemp)
            HTTP_CODE=$(curl -sS -o "${CREATE_RESP}" -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer ${HF_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "${CREATE_BODY}" \
                https://huggingface.co/api/repos/create)

            if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "409" ]; then
                echo "HF create_repo failed: HTTP ${HTTP_CODE}"
                cat "${CREATE_RESP}"
                rm -f "${CREATE_RESP}"
                exit 1
            fi
            rm -f "${CREATE_RESP}"

            echo "Pushing HF URI: ${HF_URI} from path ${HF_SOURCE}"

            REVISION_FLAG=""
            if [ -n "${HF_REVISION}" ]; then
                REVISION_FLAG="--revision ${HF_REVISION}"
            fi

            PRIVATE_FLAG=""
            if [ "${HF_PRIVATE}" = "True" ]; then
                PRIVATE_FLAG="--private"
            fi

            REPO_TYPE_FLAG=""
            if [ -n "${HF_TYPE}" ]; then
                REPO_TYPE_FLAG="--repo-type ${HF_TYPE}"
            fi

            hf upload "${HF_REPO}" "${HF_SOURCE}" ${REVISION_FLAG} ${PRIVATE_FLAG} ${REPO_TYPE_FLAG}

            MY_EXIT_CODE=$?
            if [ "${MY_EXIT_CODE}" != "0" ]; then
                echo "hfpush failed, exit code: ${MY_EXIT_CODE}" >&2
                exit 1
            fi

            echo "Pushed HF URI: ${HF_URI} for binding ${BINDING_ID}"
            echo 'hfpush end'
    monitors:
      skypilot_monitor:
        type: skypilot_monitor
        config:
          poll_interval_seconds: 15
          event_configs:
          - event_type: ARTIFACT_PUSHED_EVENT
            line_regex: "Pushed HF URI:\\s.+"
            is_json: False
            event_fields:
              - field_name: uri
                field_regex: "hf://[^\\s]+"
              - field_name: binding_id
                field_regex: "(?<=binding\\s)[^\\s]+"
