######
# Sage multilingual evaluation suite on BlueVela (LSF).
# Runs 5 parallel eval targets: global_mmlu, mgsm, and 3 INCLUDE language groups.
# Each target is an independent LSF job via lsf-skypilot.
######
granite.build:
  name: multilingual-eval
  retries:
    max_retries: 5
  targets:
    global-mmlu:
      environment_uri: space://environments/lsf-skypilot
      inputs:
        model_checkpoint:
          uri: "env://$${MODEL_PATH}"
          type: model
      outputs:
        sage_eval_results:
          type: dataset
          uri: "env://$${OUTPUT_DIR}/$${EXPERIMENT}/multilingual/global_mmlu"
      steps:
        - step_uri: space://steps/sage-eval
          config:
            sage_eval_config:
              gb_script: "multilingual_global_mmlu_slim.sh"
              model_path: "$${MODEL_PATH}"
              experiment: "$${EXPERIMENT}"
              batch_size: $${BATCH_SIZE}
              max_length: $${MAX_LENGTH}
              num_gpus: $${NUM_GPUS}
              output_dir: "$${OUTPUT_DIR}"
              image_id: "docker:us.icr.io/cil15-shared-registry/sage-py311-multilingual:0.025"
              extra_env: {}
            launcher_config:
              resources:
                accelerators: "$${ACCELERATORS}"
                cluster: "$${CLUSTER}"
                zone: "$${QUEUE}"
                memory: "$${MEMORY}"

    mgsm:
      environment_uri: space://environments/lsf-skypilot
      inputs:
        model_checkpoint:
          uri: "env://$${MODEL_PATH}"
          type: model
      outputs:
