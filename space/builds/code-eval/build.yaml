######
# Sage code evaluation suite on BlueVela (LSF).
# Runs 9 parallel eval targets: OLMES code evals, EvalPlus, and Multiple-language.
######
granite.build:
  name: code-eval
  retries:
    max_retries: 5
  targets:
    olmes-cruxeval:
      environment_uri: space://environments/lsf-skypilot
      inputs:
        model_checkpoint:
          uri: "env://$${MODEL_PATH}"
          type: model
      outputs:
        sage_eval_results:
          type: dataset
          uri: "env://$${OUTPUT_DIR}/$${EXPERIMENT}/code/olmes-instruct/cruxeval_output"
      steps:
        - step_uri: space://steps/sage-eval
          config:
            sage_eval_config:
              gb_script: "code_olmes_cruxeval_slim.sh"
              model_path: "$${MODEL_PATH}"
              experiment: "$${EXPERIMENT}"
              batch_size: $${BATCH_SIZE}
              max_length: $${MAX_LENGTH}
              num_gpus: $${NUM_GPUS}
              output_dir: "$${OUTPUT_DIR}"
              image_id: "docker:us.icr.io/cil15-shared-registry/sage-py311-olmes:0.025"
              extra_env: {}
            launcher_config:
              resources:
                accelerators: "$${ACCELERATORS}"
                cluster: "$${CLUSTER}"
                zone: "$${QUEUE}"
                memory: "$${MEMORY}"

    olmes-bigcodebench:
      environment_uri: space://environments/lsf-skypilot
      inputs:
        model_checkpoint:
