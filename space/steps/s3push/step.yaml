name: s3push
version: 1.0.0
type: upload
config:
  gb:
    step_contents_in_env: false
  s3push_config:
    local_path: <source>
    s3_uri: <s3://bucket/path>
    endpoint_url: ""
  compute_config:
    num_gpus_per_node: 0
    total_memory_per_node: 4Gi
environment_configs:
  Runpod:
    launchers:
      s3push:
        type: runpod
        monitors:
        - pod_status_monitor
        config:
          image: amazon/aws-cli:latest
    monitors:
      pod_status_monitor:
        type: pod_status_monitor
  Bash:
    launchers:
      s3push:
        type: nohup
        monitors:
        - log_monitor
    monitors:
      log_monitor:
        type: log_monitor
  K8s:
    launchers:
      s3push:
        type: helm
        monitors:
        - log_monitor
        config:
          chart: helm-charts/s3push
    monitors:
      log_monitor:
        type: sidecar_monitor
  Lsf:
    launchers:
      s3push:
        type: bsub
        monitors:
        - bsub_monitor
        - logfile_monitor
    monitors:
      bsub_monitor:
        type: bsub_monitor
      logfile_monitor:
        type: logfile_monitor
  Docker:
    launchers:
      s3push:
        type: docker
        monitors:
        - docker_log
        config:
          image: amazon/aws-cli:latest
    monitors:
      docker_log:
        type: docker_log
  Skypilot:
    default_launcher: s3push
    launchers:
      s3push:
        type: skypilot
        monitors:
        - skypilot_monitor
        config:
          image_id: "docker:us.icr.io/cil15-shared-registry/s3push:ubuntu-0.0.1"
          resources:
            cpus: "2+"
            memory: "4+"
          run: |
            set -e
            echo 's3push start'
            # Map S3_* env vars (from pod_config) to AWS_* env vars (for aws cli)
            export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID:-$S3_ACCESS_KEY_ID}"
            export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY:-$S3_SECRET_ACCESS_KEY}"
            if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
              echo "ERROR: AWS_ACCESS_KEY_ID/S3_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY/S3_SECRET_ACCESS_KEY must be set" >&2
              exit 1
            fi
            {% if config.s3push_config.endpoint_url %}
            aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}" --endpoint-url "{{ config.s3push_config.endpoint_url }}"
            {% elif config.s3push_config.endpoint_url == "" %}
            aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}"
            {% else %}
            ENDPOINT="${S3_ENDPOINT_URL:-}"
            if [ -n "$ENDPOINT" ]; then
              aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}" --endpoint-url "$ENDPOINT"
            else
              aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}"
            fi
            {% endif %}
            echo 's3push end'
    monitors:
      skypilot_monitor:
        type: skypilot_monitor
        config:
          poll_interval_seconds: 15
  Skypilot_managed:
    default_launcher: s3push
    launchers:
      s3push:
        type: skypilot_managed
        monitors:
        - skypilot_managed_monitor
        config:
          image_id: "docker:us.icr.io/cil15-shared-registry/s3push:ubuntu-0.0.1"
          resources:
            cpus: "2+"
            memory: "4+"
          run: |
            set -e
            echo 's3push start'
            # Map S3_* env vars (from pod_config) to AWS_* env vars (for aws cli)
            export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID:-$S3_ACCESS_KEY_ID}"
            export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY:-$S3_SECRET_ACCESS_KEY}"
            if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
              echo "ERROR: AWS_ACCESS_KEY_ID/S3_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY/S3_SECRET_ACCESS_KEY must be set" >&2
              exit 1
            fi
            {% if config.s3push_config.endpoint_url %}
            aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}" --endpoint-url "{{ config.s3push_config.endpoint_url }}"
            {% elif config.s3push_config.endpoint_url == "" %}
            aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}"
            {% else %}
            ENDPOINT="${S3_ENDPOINT_URL:-}"
            if [ -n "$ENDPOINT" ]; then
              aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}" --endpoint-url "$ENDPOINT"
            else
              aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}"
            fi
            {% endif %}
            echo 's3push end'
    monitors:
      skypilot_managed_monitor:
        type: skypilot_managed_monitor
        config:
          poll_interval_seconds: 30
