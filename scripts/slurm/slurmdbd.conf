# slurmdbd.conf -- SLURM database daemon configuration
#
# Connects to MariaDB for job accounting storage.
# Used by the Docker SLURM cluster (docker-compose.yml).

# ---- Authentication ----
AuthType=auth/munge

# ---- Database ----
StorageType=accounting_storage/mysql
StorageHost=mysql
StoragePort=3306
StorageLoc=slurm_acct_db
StorageUser=slurm
StoragePass=password

# ---- Daemon ----
DbdHost=slurmdbd
DbdPort=6819
SlurmUser=slurm

# ---- Logging ----
DebugLevel=info
LogFile=/var/log/slurm/slurmdbd.log
PidFile=/run/slurmdbd.pid
