# slurm.conf -- SLURM configuration for Docker development cluster
#
# 2 compute nodes (c1, c2), 1 partition (normal), GPU GRES config.
# Used by setup-slurm.sh for local development and CI.

# ---- Cluster identity ----
ClusterName=linux
SlurmctldHost=slurmctld

# ---- Paths ----
SlurmctldPidFile=/run/slurmctld.pid
SlurmdPidFile=/run/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
StateSaveLocation=/var/spool/slurmctld
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# ---- Authentication ----
AuthType=auth/munge
CryptoType=crypto/munge

# ---- Communication ----
SlurmctldPort=6817
SlurmdPort=6818

# ---- Scheduling ----
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# ---- Accounting ----
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=slurmdbd
AccountingStoragePort=6819
JobAcctGatherType=jobacct_gather/linux

# ---- Process tracking ----
ProctrackType=proctrack/linuxproc

# ---- Logging ----
SlurmctldDebug=info
SlurmdDebug=info

# ---- Return to service automatically ----
ReturnToService=2

# ---- Timeouts ----
SlurmctldTimeout=120
SlurmdTimeout=120
InactiveLimit=0
MinJobAge=300
WaitTime=0

# ---- GPU GRES configuration ----
GresTypes=gpu

# ---- Compute nodes ----
# Each node advertises 2 CPUs, 1024 MB RAM, and 1 (fake) GPU.
# The GPUs are virtual -- no physical GPU required. This allows
# SkyPilot SLURM jobs that request GPUs to be scheduled.
NodeName=c1 CPUs=2 RealMemory=1024 Gres=gpu:1 State=UNKNOWN
NodeName=c2 CPUs=2 RealMemory=1024 Gres=gpu:1 State=UNKNOWN

# ---- Partitions ----
PartitionName=normal Nodes=c1,c2 Default=YES MaxTime=INFINITE State=UP
