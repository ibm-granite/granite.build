name: docker-image-hf
type: Docker
config:
  defaults:
    pull_policy: "if-not-present"
    env: {}
assetstores:
  - store_uri: space://assetstores/hf/
    load:
      - mode: default
    push:
      - mode: default
  # Local filesystem — load/push artifacts via file: URIs.
  - store_uri: space://assetstores/local/
    load:
      - mode: default
    push:
      - mode: default
