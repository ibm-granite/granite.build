name: digit
version: 1.0.0
type: SDG
config:
  workload:
    cwd: .
  gb:
    mock: false
    step_contents_in_env: false
  digit_config: {}
inputs:
  optional:
    digit_input:
      type: fileset
      accept:
      - uri
      - binding
outputs:
  optional:
    digit_output:
      type: dataset
environment_configs:
  K8s:
    launchers:
      digit:
        type: helm
        monitors:
        - log_monitor
        config:
          chart: helm-charts/digit
    monitors:
      log_monitor:
        type: sidecar_monitor
        config:
          event_configs:
          - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
            line_regex: Generated\sData:\s.+
            is_json: false
            event_fields:
            - field_name: binding_id
              field_value_template: digit_output
            - field_name: path
              field_regex: '[^\s]+[.]jsonl'
              is_data: true
            - field_name: binding
              field_value_template: '{ "path": "{{ fields.data.path }}" }'
              is_json: true
