name: hfpush
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false # disables the copy of step folder to pod
  k8s:
    app_wrapper_config:
      retryLimit: 2
  workload:
    cwd: "." # Keep the default current working directory specified in the container image
  hfpush_config:
    path: <path>         # where the asset to push is located
    uri: <uri>           # hf://models/... or hf://datasets/... or hf://spaces/... etc.
    binding_id: <binding_id>  # output binding name, used to match the pushed artifact
    hf:
      type: model   # could be model, dataset, space, or bucket
      owner: ""     # Hugging Face org/user
      repo: ""      # repo name
      revision: ""  # optional, e.g. main / commit hash
      private: true  # whether to create a private repo (default: true)
      organization: null  # optional organization to override owner for repo creation
      resource_group_id: null  # optional resource group ID for Enterprise access control
                               # can be set by param or via GBSERVER_HF_RESOURCE_GROUP env var
  compute_config:
    total_memory_per_node: 10Gi

environment_configs:
  K8s:
    launchers:
      hfpush:
        type: helm
        monitors:
        - log_monitor
        config:
          chart: helm-charts/hfpush
    monitors:
      log_monitor:
        type: sidecar_monitor
        config:
          event_configs:
          - event_type: ARTIFACT_PUSHED_EVENT
            line_regex: "Pushed HF URI:\\s.+"
            is_json: False
            event_fields:
              - field_name: uri
                field_regex: "hf://[^\\s]+"
              - field_name: binding_id
                field_regex: "(?<=binding\\s)[^\\s]+"
  Lsf:
    launchers:
      tuning:
        type: bsub
        monitors:
        - bsub_monitor
    monitors:
      bsub_monitor:
        type: bsub_monitor
        config:
          event_configs:
          - event_type: ARTIFACT_PUSHED_EVENT
            line_regex: "Pushed HF URI:\\s.+"
            is_json: False
            event_fields:
              - field_name: uri
                field_regex: "hf://[^\\s]+"
              - field_name: binding_id
                field_regex: "(?<=binding\\s)[^\\s]+"
  Skypilot:
    default_launcher: hfpush
    launchers:
      hfpush:
        type: skypilot
        monitors:
        - skypilot_monitor
        config:
          # No image_id: runs on the SkyPilot launcher host directly. The host
          # must have python/pip available; setup pip-installs huggingface_hub
          # so the run script can use the Python API for create_repo (no curl,
          # no apt-get, no docker container required).
          resources:
            # No `memory:` spec: SLURM clusters with the default
            # `SelectTypeParameters=CR_Core` reject memory requests
            # ("does not track memory as a consumable resource"). Cloud
            # SkyPilot allocators pick reasonable memory based on CPU
            # alone; users who need a floor can override via
            # `launcher_config.resources` in their build.yaml.
            cpus: "1+"
          setup: |
            pip install --no-cache-dir 'huggingface_hub[cli]'
          run: |
            set -euo pipefail
            trap 'EC=$?; echo "hfpush failed at line $LINENO, exit code: $EC" >&2; exit $EC' ERR
            echo 'hfpush start'

            HF_SOURCE='{{ config.hfpush_config.path }}'
            HF_URI='{{ config.hfpush_config.uri }}'
            export HF_ENDPOINT='{{ config.hfpush_config.endpoint }}'
            HF_OWNER='{{ config.hfpush_config.owner }}'
            HF_REPO_NAME='{{ config.hfpush_config.repo }}'
            export HF_REPO="${HF_OWNER}/${HF_REPO_NAME}"
            HF_REVISION='{{ config.hfpush_config.revision }}'
            export HF_PRIVATE='{{ config.hfpush_config.private }}'
            export HF_TYPE='{{ config.hfpush_config.hf.type }}'
            export HF_RESOURCE_GROUP_ID='{{ config.hfpush_config.hf.resource_group_id }}'
            BINDING_ID='{{ config.hfpush_config.binding_id }}'

            if [ -z "${HF_TOKEN:-}" ]; then
                echo 'HF_TOKEN is not set' >&2
                exit 1
            fi

            # Create the HF repo (idempotent) via the huggingface_hub Python
            # API. `hf upload` cannot attach a resource_group_id, so we
            # explicitly call create_repo with exist_ok=True. Single-quoted
            # heredoc disables bash expansion — python reads everything from
            # os.environ.
            echo "Creating HF repo ${HF_REPO} (resource_group_id=${HF_RESOURCE_GROUP_ID:-<none>})"
            python - <<'PY'
            import os
            from huggingface_hub import HfApi
            rg = os.environ.get("HF_RESOURCE_GROUP_ID") or ""
            HfApi(token=os.environ["HF_TOKEN"]).create_repo(
                repo_id=os.environ["HF_REPO"],
                repo_type=os.environ["HF_TYPE"] or "model",
                private=os.environ.get("HF_PRIVATE", "True") == "True",
                resource_group_id=(rg if rg and rg != "None" else None),
                exist_ok=True,
            )
            PY

            echo "Pushing HF URI: ${HF_URI} from path ${HF_SOURCE}"

            REVISION_FLAG=""
            if [ -n "${HF_REVISION}" ]; then
                REVISION_FLAG="--revision ${HF_REVISION}"
            fi

            PRIVATE_FLAG=""
            if [ "${HF_PRIVATE}" = "True" ]; then
                PRIVATE_FLAG="--private"
            fi

            REPO_TYPE_FLAG=""
            if [ -n "${HF_TYPE}" ]; then
                REPO_TYPE_FLAG="--repo-type ${HF_TYPE}"
            fi

            hf upload "${HF_REPO}" "${HF_SOURCE}" ${REVISION_FLAG} ${PRIVATE_FLAG} ${REPO_TYPE_FLAG}

            echo "Pushed HF URI: ${HF_URI} for binding ${BINDING_ID}"
            echo 'hfpush end'
    monitors:
      skypilot_monitor:
        type: skypilot_monitor
        config:
          poll_interval_seconds: 15
          event_configs:
          - event_type: ARTIFACT_PUSHED_EVENT
            line_regex: "Pushed HF URI:\\s.+"
            is_json: False
            event_fields:
              - field_name: uri
                field_regex: "hf://[^\\s]+"
              - field_name: binding_id
                field_regex: "(?<=binding\\s)[^\\s]+"
