name: image
version: 1.0.0
type: exec
config:
  image_config:
    command: ''
    image: ''
  compute_config:
    num_gpus_per_node: 0
    total_memory_per_node: 4Gi
environment_configs:
  Skypilot:
    default_launcher: image
    launchers:
      image:
        type: skypilot
        monitors:
        - skypilot_monitor
        config:
          image_id: docker:{{ config.image_config.image }}
          resources:
            cpus: 1+
            memory: 1+
          run: |
            {{ config.image_config.command }}
    monitors:
      skypilot_monitor:
        type: skypilot_monitor
        config:
          poll_interval_seconds: 5
          event_configs:
          - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
            line_regex: LLMB_ARTIFACT_ID:.* LLMB_ARTIFACT_PATH:.*
            is_json: false
            event_fields:
            - field_name: binding_id
              field_regex: (?<=LLMB_ARTIFACT_ID:)[^ ]+
            - field_name: path
              field_regex: (?<=LLMB_ARTIFACT_PATH:).*
              is_data: true
            - field_name: binding
              field_value_template: '{ "path": "{{ fields.data.path }}" }'
              is_json: true
