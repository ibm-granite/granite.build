name: hfpull
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false # disables the copy of step folder to pod
  workload:
    cwd: "." # Keep the default current working directory specified in the container image
  hfpull_config:
    path: <path>   # where asset will be cached locally in container
    uri: <uri>     # hf://models/... or hf://spaces/... etc.
    hf:
      type: model   # could be model, dataset, space, or bucket
      owner: ""     # Hugging Face org/user
      repo: ""      # repo name
      revision: ""  # optional, e.g. main / commit hash
  compute_config:
    total_memory_per_node: 10Gi

environment_configs:
  K8s:
    launchers:
      hfpull:
        type: helm
        monitors:
        - log_monitor
        config:
          chart: helm-charts/hfpull
    monitors:
      log_monitor:
        type: sidecar_monitor
        config:
          event_configs: {}
  Lsf:
    launchers:
      tuning:
        type: bsub
        monitors:
        - bsub_monitor
    monitors:
      bsub_monitor:
        type: bsub_monitor
  Skypilot:
    default_launcher: hfpull
    launchers:
      hfpull:
        type: skypilot
        monitors:
        - skypilot_monitor
        config:
          image_id: "docker:python:3.11-slim"
          resources:
            cpus: "2+"
            memory: "4+"
          setup: |
            pip install --no-cache-dir 'huggingface_hub[cli]'
          run: |
            set -euo pipefail
            trap 'EC=$?; echo "hfpull failed at line $LINENO, exit code: $EC" >&2; exit $EC' ERR
            echo 'hfpull start'

            HF_DEST='{{ config.hfpull_config.path }}'
            HF_URI='{{ config.hfpull_config.uri }}'
            export HF_ENDPOINT='{{ config.hfpull_config.endpoint }}'
            HF_REPO='{{ config.hfpull_config.owner }}/{{ config.hfpull_config.repo }}'
            HF_REVISION='{{ config.hfpull_config.revision }}'
            HF_TYPE='{{ config.hfpull_config.hf.type }}'

            if [ -z "${HF_TOKEN:-}" ]; then
                echo 'HF_TOKEN is not set' >&2
                exit 1
            fi

            REVISION_FLAG=""
            if [ -n "${HF_REVISION}" ]; then
                REVISION_FLAG="--revision ${HF_REVISION}"
            fi

            REPO_TYPE_FLAG=""
            if [ -n "${HF_TYPE}" ]; then
                REPO_TYPE_FLAG="--repo-type ${HF_TYPE}"
            fi

            mkdir -p "${HF_DEST}"
            echo "Pulling HF URI: ${HF_URI} to path ${HF_DEST}"
            hf download "${HF_REPO}" --local-dir "${HF_DEST}" ${REVISION_FLAG} ${REPO_TYPE_FLAG}

            echo "Pulled HF URI: ${HF_URI} to path ${HF_DEST}"
            echo 'hfpull end'
    monitors:
      skypilot_monitor:
        type: skypilot_monitor
        config:
          poll_interval_seconds: 15
