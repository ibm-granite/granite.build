name: s3pull
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false
  s3pull_config:
    s3_uri: <s3://bucket/path>
    local_path: <destination>
    endpoint_url: ''
  compute_config:
    num_gpus_per_node: 0
    total_memory_per_node: 4Gi
environment_configs:
  Docker:
    launchers:
      s3pull:
        type: docker
        monitors:
        - docker_log
        config:
          image: amazon/aws-cli:latest
    monitors:
      docker_log:
        type: docker_log
