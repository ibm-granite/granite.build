k8s:
  # Specify the container image with OLMES and dependencies
  image: us.icr.io/cil15-shared-registry/granite-build/olmes:0.0.19
  # If using a private registry, add imagePullSecrets:
  # imagePullSecrets:
  #   - name: your-registry-secret

olmes_eval_config:
  # Model specification with versioning
  model: "allenai/OLMo-7B"  # Model name or HF path (e.g., allenai/OLMo-7B)
  model_revision: "step1000-tokens4B"  # HF revision (tag/branch/commit)
  model_commit: "fd483312687af0209a13568b9e70403435a6c286"  # Exact commit hash for reproducibility
  model_family: "OLMo-1.x"  # OLMo 1.x based on revision format
  model_path: null  # Optional: pre-downloaded model path
  trust_remote_code: false  # Allow custom model code (security sensitive)

  # Task configuration
  tasks: ["arc_challenge::olmes", "mmlu::olmes"]  # List of task specs (e.g., ["arc_challenge::olmes", "mmlu::olmes"])
  evaluation_regime: "OLMES-v0.1"  # e.g., "OLMES-v0.1", "OLMo 2"

  # Validation options
  validate_compatibility: true
  fail_on_incompatibility: true  # vs. warn only

  # Execution options
  output_dir: "/workspace/results"
  batch_size: 16
  num_shots: null  # Override number of shots
  limit: null  # Limit instances per task (for testing)
  gpus: 1

  # Metadata for reproducibility
  track_model_hash: true
  track_tokenizer_version: true
  save_raw_requests: true

compute_config:
  num_gpus_per_node: 1
  num_cpus_per_node: 8
  total_memory_per_node: 64Gi
  total_ephemeral_storage_per_node: 200Gi
