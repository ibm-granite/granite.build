name: hfpull
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false
  workload:
    cwd: .
  hfpull_config:
    path: <path>
    uri: <uri>
    hf:
      type: model
      owner: ''
      repo: ''
      revision: ''
  compute_config:
    total_memory_per_node: 10Gi
environment_configs:
  K8s:
    launchers:
      hfpull:
        type: helm
        monitors:
        - log_monitor
        config:
          chart: helm-charts/hfpull
    monitors:
      log_monitor:
        type: sidecar_monitor
        config:
          event_configs: {}
