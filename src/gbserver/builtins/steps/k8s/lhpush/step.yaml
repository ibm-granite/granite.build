name: lhpush
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false
  k8s:
    app_wrapper_config:
      retryLimit: 2
  workload:
    python_env:
      venv: venv-lhpullpush
    cwd: .
  lhpush_config:
    path: <path>
    uri: <uri>
    binding_id: <binding_id>
    lh:
      env: STAGING
      namespace: granite_dot_build.public
      type: table
      table_name: ''
      model_label: ''
      model_revision: ''
  compute_config:
    total_memory_per_node: 10Gi
    num_gpus_per_node: 0
environment_configs:
  K8s:
    launchers:
      lhpush:
        type: helm
        monitors:
        - log_monitor
        config:
          chart: helm-charts/lhpush
    monitors:
      log_monitor:
        type: sidecar_monitor
        config:
          event_configs:
          - event_type: ARTIFACT_PUSHED_EVENT
            line_regex: Pushed\sURI:\s.+
            is_json: false
            event_fields:
            - field_name: uri
              field_regex: lh://[^\s]+
            - field_name: binding_id
              field_regex: (?<=binding\s)[^\s]+
