name: hfpush
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false
  k8s:
    app_wrapper_config:
      retryLimit: 2
  workload:
    cwd: .
  hfpush_config:
    path: <path>
    uri: <uri>
    binding_id: <binding_id>
    hf:
      type: model
      owner: ''
      repo: ''
      revision: ''
      private: true
      organization: null
      resource_group_id: null
  compute_config:
    total_memory_per_node: 10Gi
environment_configs:
  Lsf:
    launchers:
      tuning:
        type: bsub
        monitors:
        - bsub_monitor
    monitors:
      bsub_monitor:
        type: bsub_monitor
        config:
          event_configs:
          - event_type: ARTIFACT_PUSHED_EVENT
            line_regex: Pushed HF URI:\s.+
            is_json: false
            event_fields:
            - field_name: uri
              field_regex: hf://[^\s]+
            - field_name: binding_id
              field_regex: (?<=binding\s)[^\s]+
