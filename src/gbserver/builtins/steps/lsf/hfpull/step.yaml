name: hfpull
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false
  workload:
    cwd: .
  hfpull_config:
    path: <path>
    uri: <uri>
    hf:
      type: model
      owner: ''
      repo: ''
      revision: ''
  compute_config:
    total_memory_per_node: 10Gi
environment_configs:
  Lsf:
    launchers:
      tuning:
        type: bsub
        monitors:
        - bsub_monitor
    monitors:
      bsub_monitor:
        type: bsub_monitor
