name: s3push
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false
  s3push_config:
    local_path: <source>
    s3_uri: <s3://bucket/path>
    endpoint_url: ''
  compute_config:
    num_gpus_per_node: 0
    total_memory_per_node: 4Gi
environment_configs:
  Runpod:
    launchers:
      s3push:
        type: runpod
        monitors:
        - pod_status_monitor
        config:
          image: amazon/aws-cli:latest
    monitors:
      pod_status_monitor:
        type: pod_status_monitor
