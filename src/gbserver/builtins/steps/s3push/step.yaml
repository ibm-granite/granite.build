name: s3push
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false
  s3push_config:
    local_path: <source>
    s3_uri: <s3://bucket/path>
    endpoint_url: ""
  compute_config:
    num_gpus_per_node: 0
    total_memory_per_node: 4Gi
environment_configs:
  Runpod:
    launchers:
      s3push:
        type: runpod
        monitors:
        - pod_status_monitor
        config:
          image: amazon/aws-cli:latest
    monitors:
      pod_status_monitor:
        type: pod_status_monitor
  Bash:
    launchers:
      s3push:
        type: nohup
        monitors:
        - log_monitor
    monitors:
      log_monitor:
        type: log_monitor
  K8s:
    launchers:
      s3push:
        type: helm
        monitors:
        - log_monitor
        config:
          chart: helm-charts/s3push
    monitors:
      log_monitor:
        type: sidecar_monitor
  Lsf:
    launchers:
      s3push:
        type: bsub
        monitors:
        - bsub_monitor
    monitors:
      bsub_monitor:
        type: bsub_monitor
  Docker:
    launchers:
      s3push:
        type: docker
        monitors:
        - docker_log
        config:
          image: amazon/aws-cli:latest
    monitors:
      docker_log:
        type: docker_log
  Skypilot:
    default_launcher: s3push
    launchers:
      s3push:
        type: skypilot
        monitors:
        - skypilot_monitor
        config:
          image_id: "docker:amazon/aws-cli:latest"
          resources:
            cpus: "2+"
            memory: "4+"
          run: |
            set -euo pipefail
            trap 'EC=$?; echo "s3push failed at line $LINENO, exit code: $EC" >&2; exit $EC' ERR
            echo 's3push start'
            if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
              echo "ERROR: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must be set (inject via K8s secret in pod_config)" >&2
              exit 1
            fi
            {% if config.s3push_config.endpoint_url %}
            aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}" --endpoint-url "{{ config.s3push_config.endpoint_url }}"
            {% else %}
            aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}"
            {% endif %}
            echo 's3push end'
    monitors:
      skypilot_monitor:
        type: skypilot_monitor
        config:
          poll_interval_seconds: 15
  Skypilot_managed:
    default_launcher: s3push
    launchers:
      s3push:
        type: skypilot_managed
        monitors:
        - skypilot_managed_monitor
        config:
          image_id: "docker:amazon/aws-cli:latest"
          resources:
            cpus: "2+"
            memory: "4+"
          run: |
            set -euo pipefail
            trap 'EC=$?; echo "s3push failed at line $LINENO, exit code: $EC" >&2; exit $EC' ERR
            echo 's3push start'
            if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
              echo "ERROR: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must be set (inject via K8s secret in pod_config)" >&2
              exit 1
            fi
            {% if config.s3push_config.endpoint_url %}
            aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}" --endpoint-url "{{ config.s3push_config.endpoint_url }}"
            {% else %}
            aws s3 sync "{{ config.s3push_config.local_path }}" "{{ config.s3push_config.s3_uri }}"
            {% endif %}
            echo 's3push end'
    monitors:
      skypilot_managed_monitor:
        type: skypilot_managed_monitor
        config:
          poll_interval_seconds: 30
