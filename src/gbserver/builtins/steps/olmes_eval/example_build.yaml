# Example build.yaml demonstrating OLMES evaluation pipeline
# This pipeline:
# 1. Pulls a model from HuggingFace Hub
# 2. Runs OLMES evaluation on the model
# 3. Pushes results to Lakehouse

targets:
  olmes_evaluation_pipeline:
    description: "Run OLMES evaluation on OLMo-7B model"

    steps:
      # Step 1: Pull model from HuggingFace Hub
      - step_uri: "space://steps/hf_model_pull"
        name: pull_model
        config:
          hf_model_pull_config:
            model_id: "allenai/OLMo-7B"
            revision: "step1000-tokens4B"  # OLMo 1.x revision format
            output_dir: "/workspace/models"
            cache_dir: "/root/.cache/huggingface"
          compute_config:
            num_cpus_per_node: 4
            total_memory_per_node: 32Gi
            total_ephemeral_storage_per_node: 200Gi

      # Step 2: Run OLMES evaluation
      - step_uri: "space://steps/olmes_eval"
        name: evaluate
        config:
          olmes_eval_config:
            model: "allenai/OLMo-7B"
            model_revision: "step1000-tokens4B"
            model_family: "OLMo-1.x"  # Explicitly specify for validation
            evaluation_regime: "OLMES-v0.1"
            tasks:
              - "arc_challenge::olmes"
              - "arc_easy::olmes"
              - "boolq::olmes"
              - "csqa::olmes"
              - "hellaswag::olmes"
              - "mmlu::olmes"
              - "openbookqa::olmes"
              - "piqa::olmes"
              - "socialiqa::olmes"
            validate_compatibility: true
            fail_on_incompatibility: true
            output_dir: "/workspace/results"
            batch_size: 16
            gpus: 1
            track_model_hash: true
            track_tokenizer_version: true
            save_raw_requests: true
          compute_config:
            num_gpus_per_node: 1
            num_cpus_per_node: 8
            total_memory_per_node: 64Gi
            total_ephemeral_storage_per_node: 200Gi
        inputs:
          # Bind the model output from pull_model step
          model_path:
            binding: pull_model.model_path

      # Step 3: Push results to Lakehouse
      - step_uri: "space://steps/lhpush"
        name: push_results
        config:
          lhpush_config:
            source: "/workspace/results"
            target: "lh://evaluations/olmo-7B-step1000-olmes-v0.1"
            recursive: true
        inputs:
          # Depend on evaluation completing
          results_path:
            binding: evaluate.results_path

---
# Alternative example: TÜLU 3 evaluation

targets:
  tulu3_evaluation:
    description: "Run TÜLU 3 evaluation suite"

    steps:
      - step_uri: "space://steps/hf_model_pull"
        name: pull_tulu_model
        config:
          hf_model_pull_config:
            model_id: "allenai/tulu-3-7b"
            revision: "main"
            output_dir: "/workspace/models"

      - step_uri: "space://steps/olmes_eval"
        name: evaluate_tulu
        config:
          olmes_eval_config:
            model: "allenai/tulu-3-7b"
            model_family: "TÜLU-3"
            evaluation_regime: "TÜLU 3"
            tasks:
              - "tulu_3_dev"
              - "tulu_3_unseen"
            validate_compatibility: true
            output_dir: "/workspace/results"
            batch_size: 8
            gpus: 1
          compute_config:
            num_gpus_per_node: 1
            num_cpus_per_node: 8
            total_memory_per_node: 64Gi
        inputs:
          model_path:
            binding: pull_tulu_model.model_path

      - step_uri: "space://steps/lhpush"
        name: push_tulu_results
        config:
          lhpush_config:
            source: "/workspace/results"
            target: "lh://evaluations/tulu-3-7b-tulu3-suite"
            recursive: true
        inputs:
          results_path:
            binding: evaluate_tulu.results_path

---
# Example: OLMo 2 evaluation with pre-downloaded model

targets:
  olmo2_evaluation_local:
    description: "Run OLMo 2 evaluation on locally available model"

    steps:
      - step_uri: "space://steps/olmes_eval"
        name: evaluate_olmo2
        config:
          olmes_eval_config:
            model_path: "/data/models/olmo-2-7b"  # Pre-downloaded model
            model_family: "OLMo-2.x"
            evaluation_regime: "OLMo 2"
            tasks:
              - "olmo_2_generative::olmes"
              - "mmlu::olmes"
              - "core_9mcqa::olmes"
            validate_compatibility: true
            output_dir: "/workspace/results"
            batch_size: 16
            limit: 100  # Limit for testing
            gpus: 1
          compute_config:
            num_gpus_per_node: 1
            num_cpus_per_node: 8
            total_memory_per_node: 64Gi

      - step_uri: "space://steps/lhpush"
        name: push_olmo2_results
        config:
          lhpush_config:
            source: "/workspace/results"
            target: "lh://evaluations/olmo-2-7b-olmo2-suite"
            recursive: true
        inputs:
          results_path:
            binding: evaluate_olmo2.results_path
