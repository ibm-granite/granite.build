name: "CI (fork PR /test)"

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  trigger-check:
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/test') &&
      (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    outputs:
      pr_sha: ${{ steps.get-pr.outputs.sha }}
    steps:
      - name: Get PR details
        id: get-pr
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          echo "sha=$(echo $PR_DATA | jq -r .head.sha)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post "CI started" comment
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="⏳ CI triggered by \`/test\` — running lint, test, and demo-cpu on commit \`${PR_SHA:0:7}\`..."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_SHA: ${{ steps.get-pr.outputs.sha }}

  lint:
    needs: trigger-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[standalone,thirdparty,dev]"

      - name: Check formatting (isort)
        run: isort --check .

      - name: Check formatting (black)
        run: black --check .

      - name: Lint (pylint)
        run: |
          pylint src/gbserver/
          pylint src/gbcli/
          pylint src/gbcommon/

      - name: Type check (mypy)
        continue-on-error: true
        run: |
          mypy --disable-error-code=import-untyped --ignore-missing-imports src/gbserver/
          mypy --disable-error-code=import-untyped --ignore-missing-imports src/gbcli/
          mypy --disable-error-code=import-untyped --ignore-missing-imports src/gbcommon/

  test:
    needs: trigger-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[standalone,thirdparty,dev]"

      - name: Run tests (standalone + thirdparty)
        run: pytest -s test/ -m 'not ibm'

  demo-cpu:
    needs: trigger-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[standalone,docker,dev]"

      - name: Build CPU test image
        run: |
          docker build -t gbserver-test-trl-unitxt:cpu \
            -f test-data/standalone-environments/docker/Dockerfile.cpu.test \
            test-data/standalone-environments/docker/

      - name: Run standalone demo (CPU)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: bash scripts/demo-standalone.sh

  report:
    needs: [lint, test, demo-cpu]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Post results
        run: |
          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.demo-cpu.result }}" == "success" ]; then
            BODY="✅ CI passed — all checks successful on commit \`${PR_SHA:0:7}\`."
          else
            BODY="❌ CI failed:\n- lint: ${{ needs.lint.result }}\n- test: ${{ needs.test.result }}\n- demo-cpu: ${{ needs.demo-cpu.result }}\n\n[View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_SHA: ${{ needs.trigger-check.outputs.pr_sha }}
