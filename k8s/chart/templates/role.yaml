{{- if not .Values.generateResourcesForLLMBBackendCluster }}
{{- $roleName := printf "granite-dot-build-role-%s" .Release.Name }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: '{{ $roleName }}'
  labels:
    'llmbuild/internal': '{{ $roleName }}'
rules:
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - list
  - get
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - list
  - get
  - create
- apiGroups:
  - kubeflow.org
  resources:
  - pytorchjobs
  verbs:
  - list
  - get
  - create
  - delete
- apiGroups:
  - ""
  resources:
  - secrets
  - configmaps
  verbs:
  - list
  - get
  - create
  - update
  - delete
- apiGroups:
  - workload.codeflare.dev
  resources:
  - appwrappers
  verbs:
  - list
  - get
  - create
  - delete
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - watch
  - get
  - list
{{- end }}
